  <text x="540" y="245" font-family="Segoe UI, sans-serif" font-size="20" fill="#1d4ed8">Port 2222</text>

  <rect x="470" y="300" width="300" height="120" rx="14" fill="#dcfce7" stroke="#4ade80"/>
  <text x="515" y="365" font-family="Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#14532d">HTTP Service</text>
  <text x="540" y="395" font-family="Segoe UI, sans-serif" font-size="20" fill="#15803d">Port 8080</text>

  <rect x="860" y="165" width="260" height="120" rx="14" fill="#fee2e2" stroke="#f87171"/>
  <text x="930" y="230" font-family="Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#7f1d1d">IDS</text>
  <text x="890" y="260" font-family="Segoe UI, sans-serif" font-size="18" fill="#991b1b">Flood + Payload Detection</text>

