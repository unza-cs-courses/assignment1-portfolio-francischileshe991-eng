  <text x="70" y="130" font-family="Segoe UI, sans-serif" font-size="24" fill="#334155">SSH/HTTP emulation, IDS detection, and post-capture analysis</text>

  <rect x="90" y="190" width="280" height="140" rx="14" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="125" y="250" font-family="Segoe UI, sans-serif" font-size="30" font-weight="700" fill="#1e293b">Attackers</text>
