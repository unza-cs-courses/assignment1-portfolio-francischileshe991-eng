  <line x1="370" y1="260" x2="470" y2="210" stroke="#334155" stroke-width="4"/>
  <line x1="370" y1="260" x2="470" y2="360" stroke="#334155" stroke-width="4"/>
  <line x1="770" y1="210" x2="860" y2="225" stroke="#334155" stroke-width="4"/>
  <line x1="770" y1="360" x2="860" y2="380" stroke="#334155" stroke-width="4"/>

  <text x="70" y="620" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#0f172a">core/ssh_service.py | core/http_service.py | detection/ids.py | detection/analyzer.py</text>
