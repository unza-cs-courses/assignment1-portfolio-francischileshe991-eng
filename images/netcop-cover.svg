<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">NetCop V2.1 CLI Cover</title>
  <desc id="desc">Terminal style project cover image for NetCop network traffic analyzer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect x="70" y="70" width="1060" height="560" rx="14" fill="#020617" stroke="#334155" stroke-width="2"/>
  <circle cx="105" cy="104" r="8" fill="#ef4444"/>
  <circle cx="132" cy="104" r="8" fill="#f59e0b"/>
  <circle cx="159" cy="104" r="8" fill="#22c55e"/>
  <text x="190" y="110" font-family="Consolas, 'Courier New', monospace" font-size="22" fill="#93c5fd">netcop@forensics:~</text>

  <text x="100" y="170" font-family="Consolas, 'Courier New', monospace" font-size="30" fill="#22d3ee">$ python netcop.py --interface eth0 --detect-anomalies</text>
  <text x="100" y="225" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#e2e8f0">[INFO] Real-time packet capture started on eth0</text>
  <text x="100" y="265" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#e2e8f0">[INFO] Logging to traffic_log_20260308_031500.csv</text>
  <text x="100" y="305" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#e2e8f0">[INFO] SQLite session opened: netcop.db</text>
  <text x="100" y="355" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#fbbf24">[ALERT] Port-scan pattern detected from 10.0.0.23</text>
  <text x="100" y="395" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#f87171">[ALERT] Potential DoS burst detected from 192.168.1.17</text>
  <text x="100" y="455" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#a7f3d0">[OK] Session summary saved for forensic review</text>

  <rect x="95" y="500" width="370" height="90" rx="12" fill="#0f766e" opacity="0.35"/>
  <text x="115" y="555" font-family="Segoe UI, sans-serif" font-size="34" font-weight="700" fill="#99f6e4">NetCop V2.1</text>
</svg>
